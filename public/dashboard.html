<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICROSTORE_OS // Dashboard</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
  body { display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 230px;
    flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--border-line);
    display: flex;
    flex-direction: column;
    padding: 1.2rem 0;
  }
  #sidebar .logo {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--text-bright);
    letter-spacing: 0.06em;
    padding: 0 1.2rem 1.4rem;
    border-bottom: 1px solid var(--border-line);
    margin-bottom: 1rem;
  }
  #sidebar .logo span { color: var(--accent-cyan); }

  .nav-section-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.5rem 1.2rem 0.3rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.9rem;
    border-left: 2px solid transparent;
    transition: all 0.12s;
  }
  .nav-item:hover { color: var(--text-primary); background: rgba(0,240,255,0.04); }
  .nav-item.active {
    color: var(--accent-cyan);
    border-left-color: var(--accent-cyan);
    background: rgba(0,240,255,0.06);
  }
  .nav-item .icon { font-family: var(--font-mono); width: 1.2rem; text-align: center; }

  #sidebar-footer {
    margin-top: auto;
    padding: 0.8rem 1.2rem 0;
    border-top: 1px solid var(--border-line);
  }
  .conn-status { display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-mono); font-size: 0.7rem; color: var(--success); }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @media (prefers-reduced-motion: reduce) { .conn-dot { animation: none; } }

  #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.6rem;
    border-bottom: 1px solid var(--border-line);
    background: var(--bg-panel);
  }

  #guild-select {
    max-width: 260px;
  }

  #user-chip {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }
  #user-chip img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-line); }

  #content {
    flex: 1;
    overflow-y: auto;
    padding: 1.6rem;
  }

  .page-title {
    font-size: 1.3rem;
    margin: 0 0 0.3rem 0;
  }
  .page-subtitle {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 1.4rem;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--accent-cyan);
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .loading {
    font-family: var(--font-mono);
    color: var(--text-dim);
    padding: 2rem;
    text-align: center;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--bg-panel-raised);
    border: 1px solid var(--accent-cyan);
    color: var(--text-primary);
    padding: 0.8rem 1.2rem;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    box-shadow: 0 0 20px -4px var(--accent-cyan);
    z-index: 10000;
    max-width: 340px;
  }
  .toast.danger { border-color: var(--danger); }
</style>
</head>
<body>

  <nav id="sidebar">
    <div class="logo">MICRO<span>STORE</span>_OS</div>

    <div class="nav-section-label">Overview</div>
    <div class="nav-item" data-view="overview"><span class="icon">▣</span> Analytics</div>

    <div class="nav-section-label">Toko</div>
    <div class="nav-item" data-view="products"><span class="icon">▤</span> Produk</div>
    <div class="nav-item" data-view="orders"><span class="icon">▥</span> Orders</div>
    <div class="nav-item" data-view="payments"><span class="icon">▦</span> Payments</div>

    <div class="nav-section-label">Konten</div>
    <div class="nav-item" data-view="youtube"><span class="icon">▶</span> YouTube</div>
    <div class="nav-item" data-view="broadcast"><span class="icon">✉</span> Broadcast</div>
    <div class="nav-item" data-view="quest-update"><span class="icon">🔔</span> Quest Update</div>

    <div class="nav-section-label">Sistem</div>
    <div class="nav-item" data-view="settings"><span class="icon">⚙</span> Settings</div>
    <div class="nav-item" data-view="logs"><span class="icon">▭</span> Logs &amp; Transcripts</div>
    <div class="nav-item" data-view="backups"><span class="icon">⛁</span> Backups</div>

    <div id="sidebar-footer">
      <div class="conn-status"><span class="conn-dot"></span> CONNECTED</div>
    </div>
  </nav>

  <div id="main-area">
    <div id="topbar">
      <select id="guild-select"></select>
      <div id="user-chip">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
        <button class="btn btn-ghost" style="margin-left:1rem;" onclick="logout()">Logout</button>
      </div>
    </div>
    <div id="content">
      <div class="loading">MEMUAT...</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
